0000000001" cx="373.33333333333337" cy="337.77777777777806" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.5999999999999996" data-y="-7.900000000000001" cx="373.33333333333337" cy="302.2222222222224" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.5999999999999996" data-y="-7.700000000000001" cx="373.33333333333337" cy="266.66666666666697" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.55" data-y="-7.475" cx="382.2222222222223" cy="226.66666666666674" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9" data-y="-7.475" cx="497.7777777777777" cy="226.66666666666674" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9000000000000004" data-y="-7.5" cx="497.7777777777776" cy="231.1111111111111" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9000000000000004" data-y="-7.7" cx="497.7777777777776" cy="266.66666666666674" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9000000000000004" data-y="-7.9" cx="497.7777777777776" cy="302.2222222222224" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9000000000000004" data-y="-8.1" cx="497.7777777777776" cy="337.7777777777776" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9000000000000004" data-y="-8.299999999999999" cx="497.7777777777776" cy="373.33333333333303" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.9" data-y="-8.525" cx="497.7777777777777" cy="413.33333333333326" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":177.77777777777766,"c":0,"e":1013.3333333333329,"b":0,"d":-177.77777777777766,"f":-1102.2222222222213};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>
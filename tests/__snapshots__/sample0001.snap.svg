t1" data-x="3.65" data-y="11.525" cx="416.875" cy="87.5" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_6" data-x="-1.7749999999999997" data-y="6.75" cx="145.625" cy="326.25" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_6" data-x="1.9999999999999996" data-y="11.525" cx="334.375" cy="87.5" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-1.7749999999999997" data-y="6.75" cx="145.625" cy="326.25" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-1.6" data-y="6.4" cx="154.375" cy="343.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0" data-y="8" cx="234.375" cy="263.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="1.6" data-y="9.6" cx="314.375" cy="183.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="1.9999999999999996" data-y="11.525" cx="334.375" cy="87.5" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0.24999999999999978" data-y="3.2249999999999996" cx="246.875" cy="502.5" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0" data-y="3.2" cx="234.375" cy="503.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="1.6" data-y="4.800000000000001" cx="314.375" cy="423.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="1.6" data-y="6.4" cx="314.375" cy="343.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="3.2" data-y="8" cx="394.375" cy="263.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="3.2" data-y="9.6" cx="394.375" cy="183.75" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="3.65" data-y="11.525" cx="416.875" cy="87.5" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":50,"c":0,"e":234.375,"b":0,"d":-50,"f":663.75};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>